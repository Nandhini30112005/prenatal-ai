<!DOCTYPE html>
<html>
<head>
    <title>Prenatal AI System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🧠 Prenatal AI Diagnostic System</h1>

<form method="POST" action="/predict" enctype="multipart/form-data">
    <input type="number" step="0.01" name="nipt" placeholder="NIPT (0-1)" required>
    <input type="number" step="0.01" name="cvs" placeholder="CVS (0-1)" required>
    <input type="file" name="image" required>
    <button type="submit">Analyze</button>
</form>

{% if result %}

<div class="card result">
    <h2>{{ diagnosis }}</h2>
    <h3>Risk: {{ result }}</h3>
    <p>Confidence: {{ confidence }}%</p>
</div>

<div class="card">
    <h3>Input Analysis</h3>
    <p>NIPT: <span id="niptVal">{{ nipt }}</span></p>
    <p>CVS: <span id="cvsVal">{{ cvs }}</span></p>
    <p>Imaging: <span id="imgVal">{{ imaging }}</span></p>
</div>

<div class="card">
    <h3>Uploaded Image</h3>
    <img src="{{ url_for('static', filename='uploads/' + image) }}" width="300">
</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<a href="/report?diagnosis={{ diagnosis }}&result={{ result }}&confidence={{ confidence }}">
    <button>Download Report</button>
</a>

{% endif %}

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
